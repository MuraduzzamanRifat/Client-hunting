<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LeadGen AI{% endblock %}</title>
    {% block head_extra %}{% endblock %}
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-card: #111827;
            --bg-card-hover: #1a2236;
            --bg-input: #0d1321;
            --border: #1e293b;
            --border-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --green: #22c55e;
            --green-bg: rgba(34,197,94,0.1);
            --yellow: #eab308;
            --yellow-bg: rgba(234,179,8,0.1);
            --red: #ef4444;
            --red-bg: rgba(239,68,68,0.1);
            --purple: #a78bfa;
            --purple-bg: rgba(167,139,250,0.1);
            --sidebar-w: 220px;
            --radius: 10px;
            --radius-sm: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; }

        /* ── Sidebar ─────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w); background: var(--bg-card);
            border-right: 1px solid var(--border); padding: 24px 0;
            position: fixed; top: 0; left: 0; bottom: 0;
            display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar-logo {
            padding: 0 20px 24px; font-size: 16px; font-weight: 700;
            color: var(--accent); letter-spacing: -0.5px;
            border-bottom: 1px solid var(--border); margin-bottom: 12px;
        }
        .sidebar-logo span { color: var(--text-muted); font-weight: 400; font-size: 12px; display: block; margin-top: 2px; }
        .sidebar nav { flex: 1; }
        .sidebar a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 20px; color: var(--text-muted); text-decoration: none;
            font-size: 13px; font-weight: 500; transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .sidebar a:hover { color: var(--text-primary); background: var(--bg-card-hover); }
        .sidebar a.active { color: var(--accent); background: rgba(59,130,246,0.08); border-left-color: var(--accent); }
        .sidebar a svg { width: 18px; height: 18px; opacity: 0.7; }
        .sidebar a.active svg { opacity: 1; }
        .sidebar-footer {
            padding: 16px 20px; border-top: 1px solid var(--border);
            font-size: 11px; color: var(--text-muted);
        }
        .sidebar-status { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 12px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

        /* ── Main Content ────────────────────────── */
        .main { margin-left: var(--sidebar-w); flex: 1; padding: 24px 32px; max-width: 1200px; }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px;
        }
        .page-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .page-header-right { display: flex; align-items: center; gap: 12px; }

        /* ── Cards ───────────────────────────────── */
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--border-hover); }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .card-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

        /* ── KPI Grid ────────────────────────────── */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .kpi-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 18px; transition: all 0.2s; cursor: default;
        }
        .kpi-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
        .kpi-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .kpi-value { font-size: 30px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
        .kpi-value.green { color: var(--green); }
        .kpi-value.red { color: var(--red); }
        .kpi-value.yellow { color: var(--yellow); }
        .kpi-value.blue { color: var(--accent); }
        .kpi-value.purple { color: var(--purple); }

        /* ── Grid Layouts ────────────────────────── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .grid-3-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }

        /* ── Forms ───────────────────────────────── */
        label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border);
            border-radius: var(--radius-sm); background: var(--bg-input);
            color: var(--text-primary); font-size: 14px; transition: border-color 0.15s;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--accent); }
        .btn-primary {
            padding: 12px 24px; border: none; border-radius: var(--radius-sm);
            background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
            cursor: pointer; width: 100%; transition: all 0.15s;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; }
        .checkbox-row input[type="checkbox"] { width: auto; accent-color: var(--accent); }
        .row { display: flex; gap: 16px; margin-bottom: 16px; }
        .row > div { flex: 1; }

        /* ── Status badges ───────────────────────── */
        .status-badge {
            padding: 6px 14px; border-radius: 20px; display: inline-flex;
            align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
        }
        .status-badge.running { background: var(--yellow-bg); color: var(--yellow); }
        .status-badge.idle { background: var(--green-bg); color: var(--green); }

        /* ── Log area ────────────────────────────── */
        .log-box {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 14px; max-height: 300px;
            overflow-y: auto; font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 12px; line-height: 1.8; color: var(--text-muted);
        }
        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── Email list ──────────────────────────── */
        .email-row {
            padding: 14px 0; border-bottom: 1px solid var(--border); cursor: default;
        }
        .email-row:last-child { border-bottom: none; }
        .email-row:hover { background: var(--bg-card-hover); margin: 0 -20px; padding: 14px 20px; border-radius: var(--radius-sm); }
        .email-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .badge {
            padding: 3px 8px; border-radius: 4px; font-size: 10px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
        }
        .badge.business { background: rgba(59,130,246,0.15); color: var(--accent); }
        .badge.personal { background: var(--green-bg); color: var(--green); }
        .badge.marketing { background: rgba(234,179,8,0.12); color: var(--yellow); }
        .email-subject { font-weight: 600; color: var(--text-primary); font-size: 14px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .email-date { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
        .email-sender { color: var(--text-secondary); font-size: 13px; margin-bottom: 4px; }
        .email-snippet { color: var(--text-muted); font-size: 13px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* ── Filter buttons ──────────────────────── */
        .filters { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .filter-btn {
            padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
            background: none; color: var(--text-muted); cursor: pointer;
            font-size: 12px; font-weight: 500; transition: all 0.15s;
        }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .filter-btn:hover:not(.active) { border-color: var(--border-hover); color: var(--text-secondary); }
        .sort-select {
            padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-input); color: var(--text-secondary); font-size: 12px; margin-left: auto;
        }

        /* ── Responsive ──────────────────────────── */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 16px; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .grid-2, .grid-3-1 { grid-template-columns: 1fr; }
            .row { flex-direction: column; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        LeadGen AI
        <span>by mjrifat.com</span>
    </div>
    <nav>
        <a href="/" {% if active_page == 'pipeline' %}class="active"{% endif %}>
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            Pipeline
        </a>
        <a href="/inbox" {% if active_page == 'inbox' %}class="active"{% endif %}>
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            Inbox
        </a>
        <a href="/monitor" {% if active_page == 'monitor' %}class="active"{% endif %}>
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            Monitor
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="sidebar-status">
            <div class="dot live"></div>
            <span>System Live</span>
        </div>
        <div>knock@mjrifat.com</div>
    </div>
</aside>

<div class="main">
    {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}
</body>
</html>
