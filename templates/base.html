<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cold Email System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: #c9d1d9; }
        .sidebar { background: #161b22; min-height: 100vh; border-right: 1px solid #30363d; }
        .sidebar .nav-link { color: #8b949e; padding: .75rem 1.25rem; border-radius: 6px; margin: 2px 8px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #f0f6fc; background: #21262d; }
        .sidebar .nav-link i { width: 24px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1.5rem; }
        .stat-card h3 { font-size: 2rem; margin: 0; }
        .stat-card small { color: #8b949e; }
        .brand { font-size: 1.1rem; font-weight: 700; color: #58a6ff; padding: 1.25rem; border-bottom: 1px solid #30363d; }
        .main-content { padding: 2rem; }
        .table { --bs-table-bg: transparent; }
        .badge-new { background: #238636; }
        .badge-contacted { background: #1f6feb; }
        .badge-replied { background: #a371f7; }
        .progress-bar-custom { background: #238636; }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column" style="width: 240px;">
        <div class="brand"><i class="bi bi-envelope-at"></i> ColdMail AI</div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a class="nav-link {% if request.endpoint == 'leads_page' %}active{% endif %}" href="/leads">
                <i class="bi bi-people"></i> Leads
            </a>
            <a class="nav-link {% if request.endpoint == 'scrape_page' %}active{% endif %}" href="/scrape">
                <i class="bi bi-search"></i> Scrape
            </a>
            <a class="nav-link {% if request.endpoint == 'send_page' %}active{% endif %}" href="/send">
                <i class="bi bi-send"></i> Send
            </a>
            <a class="nav-link" href="/export?format=csv">
                <i class="bi bi-download"></i> Export CSV
            </a>
        </nav>
        <div class="mt-auto p-3" style="color:#484f58; font-size:.75rem;">
            ColdMail AI v1.0
        </div>
    </div>

    <!-- Main -->
    <div class="flex-grow-1 main-content">
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
